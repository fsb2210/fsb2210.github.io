baseURL = "https://fsb2210.github.io"
theme = "LoveIt"
title = "f"
defaultContentLanguage = "en"
languageCode = "en"
languageName = "English"

enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

[pagination]
  disableAliases = false
  pagerSize = 10
  path = "page"

# Menu config
[menu]
  [[menu.main]]
    weight = 1
    identifier = "posts"
    pre = ""
    post = ""
    name = "Posts"
    url = "/posts/"
    title = ""

  [[menu.main]]
    weight = 2
    identifier = "tags"
    pre = ""
    post = ""
    name = "Tags"
    url = "/tags/"
    title = ""

  [[menu.main]]
    weight = 3
    identifier = "categories"
    pre = ""
    post = ""
    name = "Categories"
    url = "/categories/"
    title = ""

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  defaultTheme = "dark"
  gitRepo = "https://github.com/fsb2210/fsb2210.github.io"
  title = "f"
  description = "personal website f-"

  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"
    [params.header.title]
      logo = ""
      name = "f"
      pre = "-"
      post = "-"
      typeit = true

  [params.footer]
    enable = true
    custom = ''
    hugo = true
    copyright = true
    author = true
    since = 2025
    icp = ""
    license = '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  [params.home]
    rss = 10

    [params.home.profile]
      enable = true
      gravatarEmail = ""
      # avatarURL = "/images/avatar.png"
      title = ""
      subtitle = "f"
      typeit = true
      social = true
      disclaimer = ""
    [params.home.posts]
      enable = true
      paginate = 5
      defaultHiddenFromHomePage = false

  [params.social]
    GitHub = "fsb2210"
    Email= "aoszbl@proton.me"
    RSS = true

  # Page global config
  [params.page]
    rssFullText = true

    [params.page.math]
      enable = true

    [params.page.share]
      enable = true
      X = false
      Threads = false
      Facebook = false
      Line = false
      Weibo = false
      Diaspora = false
      Telegram = true

  [params.analytics]
    [params.analytics.google]
      respectDoNotTrack = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[languages]
  [languages.en]
    weight = 1
    languageCode = "en"
    languageName = "English"
    hasCJKLanguage = false
    copyright = "This work is licensed under a Creative Commons Attribution-NonCommercial 4.0 International License."
    [languages.en.menu]
      [[languages.en.menu.main]]
        weight = 1
        identifier = "posts"
        pre = ""
        post = ""
        name = "Posts"
        url = "/posts/"
        title = ""
      [[languages.en.menu.main]]
        weight = 2
        identifier = "tags"
        pre = ""
        post = ""
        name = "Tags"
        url = "/tags/"
        title = ""
      [[languages.en.menu.main]]
        weight = 3
        identifier = "categories"
        pre = ""
        post = ""
        name = "Categories"
        url = "/categories/"
        title = ""
    [languages.en.params]
      [languages.en.params.search]
        enable = true
        type = "algolia"
        contentLength = 4000
        placeholder = ""
        maxResultLength = 10
        snippetLength = 30
        highlightTag = "em"
        absoluteURL = false
        [languages.en.params.search.algolia]
          index = "index"
          appID = "4D1IDY8JU6"
          searchKey = "05332ac5ed76655a511f0da583a9afac"
      [languages.en.params.home]
        rss = 10
        [languages.en.params.home.profile]
          enable = true
          gravatarEmail = ""
          # avatarURL = "/images/avatar.png"
          title = ""
          subtitle = "f"
          typeit = true
          social = true
          disclaimer = ""
      [languages.en.params.social]
        GitHub = "fsb2210"
        Email= "aoszbl@proton.me"
        RSS = true

